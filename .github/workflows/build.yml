name: Build and Release DeckyOstMusic

on:
  push:
    tags:
      - 'v*'
  pull_request:
    branches: ['main']
  workflow_dispatch:

jobs:

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'

      - name: Setup PNPM
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install Dependencies
        run: pnpm install

      - name: Build frontend
        run: pnpm run build

      - name: Download Decky Plugin CLI
        run: |
          mkdir $(pwd)/cli
          curl -L -o $(pwd)/cli/decky "https://github.com/SteamDeckHomebrew/cli/releases/latest/download/decky-linux-x86_64"
          chmod +x $(pwd)/cli/decky

      - name: Build plugin
        run: |
          $(pwd)/cli/decky plugin build $(pwd)
          unzip "out/DeckyOstMusic.zip" -d "out/DeckyOstMusic"

      - name: Upload package
        uses: actions/upload-artifact@v4
        with:
          name: DeckyOstMusic
          path: |
            ./out/DeckyOstMusic/*

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: DeckyOstMusic
          path: DeckyOstMusic

      - name: zip/tar release
        run: |
          zip -r DeckyOstMusic.zip DeckyOstMusic/*
          tar -czvf DeckyOstMusic.tar.gz DeckyOstMusic

      - name: Create a release
        uses: ncipollo/release-action@v1
        with:
          artifacts: 'DeckyOstMusic.zip,DeckyOstMusic.tar.gz'
          allowUpdates: true
          token: ${{ secrets.GITHUB_TOKEN }}
